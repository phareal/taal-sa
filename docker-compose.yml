version: "3.9"

name: taal-dashboard

services:

  # ─────────────────────────────────────────
  # PostgreSQL 15
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: taal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taal_db}
      POSTGRES_USER: ${POSTGRES_USER:-taal_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taal_secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./postgres/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taal_user} -d ${POSTGRES_DB:-taal_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - taal_network

  # ─────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: taal_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-taal_redis_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-taal_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taal_network

  # ─────────────────────────────────────────
  # Backend FastAPI
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-production}
    container_name: taal_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-taal_user}:${POSTGRES_PASSWORD:-taal_secret}@postgres:5432/${POSTGRES_DB:-taal_db}
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-taal_user}:${POSTGRES_PASSWORD:-taal_secret}@postgres:5432/${POSTGRES_DB:-taal_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-taal_redis_secret}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production_use_openssl_rand}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://frontend:3000}
      UPLOAD_MAX_SIZE_MB: ${UPLOAD_MAX_SIZE_MB:-50}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - uploads_data:/app/uploads
      - ./backend/app:/app/app:ro   # mount en dev uniquement (voir override)
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - taal_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

  # ─────────────────────────────────────────
  # Frontend Nuxt.js 3
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-production}
      args:
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://backend:8000}
    container_name: taal_frontend
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8000}
      NUXT_PUBLIC_APP_NAME: "TAAL SA Dashboard"
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - taal_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  # ─────────────────────────────────────────
  # Nginx reverse proxy (production)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: taal_nginx
    restart: unless-stopped
    environment:
      DOMAIN:    ${DOMAIN:-localhost}
      SSL_CERT:  ${SSL_CERT:-/etc/nginx/certs/localhost.crt}
      SSL_KEY:   ${SSL_KEY:-/etc/nginx/certs/localhost.key}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - taal_network

  # ─────────────────────────────────────────
  # Migrations Alembic (job one-shot)
  # ─────────────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: taal_migrate
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-taal_user}:${POSTGRES_PASSWORD:-taal_secret}@postgres:5432/${POSTGRES_DB:-taal_db}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - taal_network

  # ─────────────────────────────────────────
  # PgAdmin (optionnel — profil tools)
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: taal_pgadmin
    profiles: ["tools"]
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@taal.tg}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - taal_network

# ─────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────
volumes:
  postgres_data:
    name: taal_postgres_data
  redis_data:
    name: taal_redis_data
  uploads_data:
    name: taal_uploads
  nginx_logs:
    name: taal_nginx_logs
  certbot_data:
    name: taal_certbot_data
  certbot_www:
    name: taal_certbot_www
  pgadmin_data:
    name: taal_pgadmin_data

# ─────────────────────────────────────────
# Réseau interne
# ─────────────────────────────────────────
networks:
  taal_network:
    name: taal_network
    driver: bridge
